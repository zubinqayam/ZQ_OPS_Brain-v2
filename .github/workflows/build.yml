name: Build ZQ Ops Brain v2

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  # ------------------------------------------------------------------ #
  #  Windows .exe build                                                  #
  # ------------------------------------------------------------------ #
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: zq-ops-brain-v2-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ------------------------------------------------------------------ #
  #  Android .apk build                                                  #
  # ------------------------------------------------------------------ #
  build-android:
    name: Build Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11718014"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri-android-init

      - name: Build Tauri Android (APK)
        run: npm run tauri-android-build
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: zq-ops-brain-v2-android
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # ------------------------------------------------------------------ #
  #  Linux build (optional, for testing)                                 #
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Linux)
        run: npm run tauri-build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: zq-ops-brain-v2-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ------------------------------------------------------------------ #
  #  Create GitHub Release on tag push                                   #
  # ------------------------------------------------------------------ #
  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: zq-ops-brain-v2-windows
          path: release/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: zq-ops-brain-v2-linux
          path: release/linux

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: zq-ops-brain-v2-android
          path: release/android
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/*.exe
            release/linux/*.deb
            release/linux/*.AppImage
            release/android/*.apk
          generate_release_notes: true
